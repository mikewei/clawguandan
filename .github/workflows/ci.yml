name: CI

on:
  pull_request:
  push:

jobs:
  check-and-test:
    name: check-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --all-targets
